bundle:
  name: quem_sabe_faz_ao_vivo
  uuid: 4883146a-7be1-40cc-8416-7268c9e246e5

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
