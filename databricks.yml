# This is a Databricks asset bundle definition for quem_sabe_faz_ao_vivo.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: quem_sabe_faz_ao_vivo
  uuid: 4883146a-7be1-40cc-8416-7268c9e246e5

include:
  - resources/*.yml

variables:
  catalog:
    description: Catalog that holds the bronze/silver/gold schemas
  source_catalog:
    description: Read-only catalog holding the raw Bakehouse dataset
    default: samples
  source_schema:
    description: Read-only schema holding the raw Bakehouse dataset
    default: bakehouse
  warehouse_id:
    description: SQL warehouse backing the AI/BI dashboard
    lookup:
      warehouse: Serverless Starter Warehouse

targets:
  dev:
    default: true
    # NOTE: 'mode: development' is deliberately NOT used here.
    # It rewrites UC schema resources to 'dev_<user>_<name>' (bronze -> dev_mateusvbkasuya_bronze),
    # which breaks a design where the schema name IS the medallion layer.
    # These presets give us the parts of dev mode we actually want, without the renaming.
    presets:
      pipelines_development: true
      trigger_pause_status: PAUSED
    workspace:
      host: https://dbc-0084980a-6974.cloud.databricks.com
      # Two local profiles match this host; pin one so CLI commands don't need --profile.
      profile: DEFAULT
    variables:
      catalog: bakehouse_dev
  prod:
    mode: production
    # mode: production reativa os triggers; este preset mantem o job diario PAUSED (como no dev).
    # Despause manualmente quando quiser que o cron 0 0 6 * * ? rode sozinho.
    presets:
      trigger_pause_status: PAUSED
    workspace:
      host: https://dbc-0084980a-6974.cloud.databricks.com
      # SEM 'profile:' de proposito. profile forca a leitura do ~/.databrickscfg, que nao
      # existe no runner do GitHub Actions — e vence ate credenciais M2M em env var.
      # Sem config file, o CLI usa DATABRICKS_CLIENT_ID/SECRET direto. prod e do CI.
      # Para rodar '-t prod' na sua maquina: databricks bundle validate -t prod -p DEFAULT
      root_path: /Workspace/${bundle.name}
    variables:
      catalog: bakehouse
    # Jobs e pipelines do prod rodam como o service_cicd, nao como quem deployou.
    run_as:
      service_principal_name: e8f6a483-affd-404c-ab06-4f68d4372656
    # run_as tira o meu nome do 'run as'; permissions devolve o controle.
    permissions:
      - user_name: mateusvbkasuya@gmail.com
        level: CAN_MANAGE
      # O SP deploya e e o run_as. Declarar a CAN_MANAGE que ele ja tem na pasta (concedida
      # no bootstrap fora do bundle) faz o bundle "dono" dela e some o warning de drift do validate.
      - service_principal_name: e8f6a483-affd-404c-ab06-4f68d4372656
        level: CAN_MANAGE
