# This is a Databricks asset bundle definition for quem_sabe_faz_ao_vivo.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: quem_sabe_faz_ao_vivo
  uuid: 4883146a-7be1-40cc-8416-7268c9e246e5

include:
  - resources/*.yml

variables:
  catalog:
    description: Catalog that holds the bronze/silver/gold schemas
  source_catalog:
    description: Read-only catalog holding the raw Bakehouse dataset
    default: samples
  source_schema:
    description: Read-only schema holding the raw Bakehouse dataset
    default: bakehouse
  warehouse_id:
    description: SQL warehouse backing the AI/BI dashboard
    lookup:
      warehouse: Serverless Starter Warehouse

targets:
  dev:
    default: true
    # NOTE: 'mode: development' is deliberately NOT used here.
    # It rewrites UC schema resources to 'dev_<user>_<name>' (bronze -> dev_mateusvbkasuya_bronze),
    # which breaks a design where the schema name IS the medallion layer.
    # These presets give us the parts of dev mode we actually want, without the renaming.
    presets:
      pipelines_development: true
      trigger_pause_status: PAUSED
    workspace:
      host: https://dbc-0084980a-6974.cloud.databricks.com
      # Two local profiles match this host; pin one so CLI commands don't need --profile.
      profile: DEFAULT
    variables:
      catalog: bakehouse_dev
  prod:
    mode: production
    workspace:
      host: https://dbc-0084980a-6974.cloud.databricks.com
      profile: DEFAULT
      # We explicitly deploy to /Workspace/Users/mateusvbkasuya@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/mateusvbkasuya@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouse_prod
    permissions:
      - user_name: mateusvbkasuya@gmail.com
        level: CAN_MANAGE
