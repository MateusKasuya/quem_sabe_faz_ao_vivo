resources:
  pipelines:
    bakehouse_medallion:
      name: "[${bundle.target}] bakehouse_medallion"
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      photon: true
      channel: CURRENT
      development: true
      libraries:
        - glob:
            include: ../src/pipeline/**
      configuration:
        pipelines.enableTrackingRowLevelLineage: "true"
